<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería - Naturaleza de Honduras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Enlace Saltar al Contenido Principal -->
  <a class="saltar" href="#main">Saltar al contenido principal</a>

  <!-- Navegación -->
  <nav aria-label="Navegación principal">
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="gallery.html" class="activo">Galería</a></li>
      <li><a href="contact.html">Contacto</a></li>
    </ul>
  </nav>

  <!-- Contenido Principal -->
  <main id="main">
    <header class="hero hero-galeria">
      <h1>Galería de Imágenes</h1>
      <p>Belleza natural capturada en cada rincón de Honduras.</p>
    </header>

    <section class="galeria-seccion">
      <h2>Paisajes y Fauna</h2>

      <div class="galeria-grid">

        <figure class="foto">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Roatan_Honduras.jpg/640px-Roatan_Honduras.jpg"
            alt="Vista aérea de las playas de Roatán, Honduras"
          />
          <figcaption>Roatán - Playa de arena blanca</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Lago_de_Yojoa.jpg/640px-Lago_de_Yojoa.jpg"
            alt="Lago de Yojoa al amanecer con montañas"
          />
          <figcaption>Lago de Yojoa al amanecer</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Copan_Ruins_03.jpg/640px-Copan_Ruins_03.jpg"
            alt="Pirámide maya en Copán entre la selva"
          />
          <figcaption>Ruinas de Copán</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/A_small_cup_of_coffee.JPG/640px-A_small_cup_of_coffee.JPG"
            alt="Taza de café hondureño recién preparado"
          />
          <figcaption>Café hondureño de altura</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Guacamaya_roja.jpg/640px-Guacamaya_roja.jpg"
            alt="Guacamaya roja posada en una rama"
          />
          <figcaption>Guacamaya roja - Ave nacional</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/24701-nature-natural-beauty.jpg/640px-24701-nature-natural-beauty.jpg"
            alt="Paisaje de montaña verde en Honduras"
          />
          <figcaption>Montañas verdes del interior</figcaption>
        </figure>

      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Naturaleza de Honduras</p>
  </footer>

</body>
</html>
