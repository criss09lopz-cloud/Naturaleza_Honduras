<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería - Naturaleza de Honduras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <a class="saltar" href="#main">Saltar al contenido principal</a>

  <nav aria-label="Navegación principal">
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="gallery.html" class="activo">Galería</a></li>
      <li><a href="contact.html">Contacto</a></li>
    </ul>
  </nav>

  <main id="main">
    <header class="hero hero-galeria">
      <h1>Galería de Imágenes</h1>
      <p>Belleza natural capturada en cada rincón de Honduras.</p>
    </header>

    <section class="galeria-seccion">
      <h2>Paisajes y Fauna</h2>

      <div class="galeria-grid">

        <figure class="foto">
          <img
            src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=640&q=80"
            alt="Playa de arena blanca con agua turquesa en el Caribe"
          />
          <figcaption>Roatán - Playa de arena blanca</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=640&q=80"
            alt="Lago tranquilo rodeado de montañas al amanecer"
          />
          <figcaption>Lago de Yojoa al amanecer</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?w=640&q=80"
            alt="Ruinas mayas antiguas en medio de la selva"
          />
          <figcaption>Ruinas de Copán</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=640&q=80"
            alt="Taza de café hondureño recién preparado"
          />
          <figcaption>Café hondureño de altura</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://images.unsplash.com/photo-1552728089-57bdde30beb3?w=640&q=80"
            alt="Guacamaya colorida posada en una rama"
          />
          <figcaption>Guacamaya - Ave nacional</figcaption>
        </figure>

        <figure class="foto">
          <img
            src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=640&q=80"
            alt="Paisaje de montaña verde con niebla"
          />
          <figcaption>Montañas verdes del interior</figcaption>
        </figure>

      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Naturaleza de Honduras</p>
  </footer>

</body>
</html>
